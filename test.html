<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script defer>
    function dialogopen(){
        document.getElementById("dialog").style.display = "block";
    }

    function x(){
        document.getElementById("dialog").style.display = "none";
    }
    </script>

    <title>Teste</title>
</head>
<body>
    <button onclick="dialogopen()">Abrir dialog</button>
    <dialog style="background-color: aqua; display: none;" id="dialog">
        <p style="color: black;">A</p>
        <button onclick="x()">X</button>
    </dialog>
</body>
</html>
